<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>America's Governors | Social Media Directory</title>
    <meta name="description" content="Follow America's Governors as they lead bipartisan solutions to improve lives through state government.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    

    <header class="hero">
        <div class="hero-content">
            <h1>America's Governors</h1>
            <p>Follow state leaders pursuing bipartisan solutions to improve lives.</p>
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search by name or state..." autocomplete="off">
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p>Loading Directory...</p>
        </div>
        
        <div class="grid" id="governorsGrid">
            <!-- Cards will be injected here by app.js -->
        </div>
        
        <div id="noResults" class="no-results hidden">
            <i class="fa-regular fa-face-frown-open"></i>
            <h3>No Governors Found</h3>
            <p>Try adjusting your search terms.</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 America's Governors Directory. A responsive UI portfolio project.</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
